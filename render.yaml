databases:
  - name: restaurante-db
    databaseName: restaurante
    user: restaurante
    plan: free

services:
  - type: web
    name: restaurante-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurante-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: restaurante-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://restaurante-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
